<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAT Logbook</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:Arial;
  margin:10px;
  background:#f3f5f7;
}

h1{
  text-align:center;
}

.section{
  background:white;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:8px;
}

input,select{
  width:100%;
  padding:6px;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:#2c7be5;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#1f5fbf;
}

.tableWrap{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th,td{
  border:1px solid #ccc;
  padding:6px;
}

th{
  background:#e9eef5;
}

.fail{
  background:#ffdede;
  font-weight:bold;
}

.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}

/* PRINT HEADER */
.printHeader{
  display:none;
}

/* PRINT MODE */
@media print{

  body{
    background:white;
    margin:0;
  }

  .entrySection{
    display:none;
  }

  .printHeader{
    display:block;
    margin-bottom:15px;
  }

  .printHeader table{
    font-size:12px;
    margin-bottom:10px;
  }

  .printHeader td{
    padding:4px;
  }

  button{
    display:none;
  }

  .section {
    box-shadow:none;
  }
}
</style>
</head>

<body>

<div class="section entrySection">

  <h3>Engineer Information</h3>

  <div class="grid">

    <label>Engineer Name
      <input id="engineerName">
    </label>

    <label>Company
      <input id="company">
    </label>

    <label>Phone
      <input id="phone">
    </label>

    <label>Equipment Make/Model
      <input id="equipment">
    </label>

    <label>Serial Number
      <input id="serial">
    </label>

    <label>Calibration Date
      <input type="date" id="calibration">
    </label>

  </div>

</div>

<div class="section entrySection">

  <h3>Job Information</h3>

  <div class="grid">

    <label>Client Name
      <input id="clientName">
    </label>

    <label>Client Address
      <input id="clientAddress">
    </label>

    <label>Date
      <input type="date" id="jobDate">
    </label>

  </div>

</div>

<div class="section entrySection">

  <h3>Add Appliance</h3>

  <div class="grid">

    <label>Description
      <input id="desc">
    </label>

    <label>Location
      <input id="applianceLocation">
    </label>

    <label>Visual
      <select id="visual">
        <option>✓</option>
        <option>✗</option>
      </select>
    </label>

    <!-- ✅ UPDATED -->
    <label>Earth Bond (Ω)
      <input 
        id="earth"
        type="number"
        step="0.01"
        inputmode="decimal"
        min="0"
        placeholder="e.g. 0.15">
    </label>

    <!-- ✅ UPDATED -->
    <label>Insulation (MΩ)
      <input 
        id="insulation"
        type="number"
        step="0.01"
        inputmode="decimal"
        min="0"
        placeholder="e.g. 200">
    </label>

    <label>Polarity
      <select id="polarity">
        <option>N/A</option>
        <option>✓</option>
        <option>✗</option>
      </select>
    </label>

    <label>Result
      <select id="result">
        <option>Pass</option>
        <option>Fail</option>
      </select>
    </label>

    <label>Re-Test Interval
      <select id="retestInterval">
        <option value="1">1 year</option>
        <option value="2">2 years</option>
      </select>
    </label>

  </div>

  <div class="controls">
    <button id="addBtn">Add Appliance</button>
    <button onclick="window.print()">Print / Export PDF</button>
    <button onclick="clearData()">Clear All</button>
  </div>

</div>

<div class="section">

  <div class="printHeader">

    <h2>PAT Testing Logbook</h2>

    <table>
      <tr><td><b>Client</b></td><td id="p_client"></td></tr>
      <tr><td><b>Address</b></td><td id="p_address"></td></tr>
      <tr><td><b>Date</b></td><td id="p_date"></td></tr>
    </table>

    <table>
      <tr><td><b>Engineer</b></td><td id="p_engineer"></td></tr>
      <tr><td><b>Company</b></td><td id="p_company"></td></tr>
      <tr><td><b>Phone</b></td><td id="p_phone"></td></tr>
      <tr><td><b>Equipment</b></td><td id="p_equipment"></td></tr>
      <tr><td><b>Serial</b></td><td id="p_serial"></td></tr>
      <tr><td><b>Calibration</b></td><td id="p_calibration"></td></tr>
    </table>

  </div>

  <div class="tableWrap">

    <table id="table">
      <thead>
        <tr>
          <th>Asset</th>
          <th>Description</th>
          <th>Location</th>
          <th>Visual</th>
          <th>Earth Bond (Ω)</th>
          <th>Insulation (MΩ)</th>
          <th>Polarity</th>
          <th>Result</th>
          <th>Re-Test</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

</div>

<script>
let rows = JSON.parse(localStorage.getItem("pat_rows") || "[]")

function saveMeta(){
  const meta={
    engineerName:engineerName.value,
    company:company.value,
    phone:phone.value,
    equipment:equipment.value,
    serial:serial.value,
    calibration:calibration.value,
    clientName:clientName.value,
    clientAddress:clientAddress.value,
    jobDate:jobDate.value
  }

  localStorage.setItem("pat_meta",JSON.stringify(meta))
  updatePrintHeader()
}

function loadMeta(){
  const meta=JSON.parse(localStorage.getItem("pat_meta")||"{}")

  Object.keys(meta).forEach(k=>{
    const el=document.getElementById(k)
    if(el) el.value=meta[k]
  })

  updatePrintHeader()
}

function updatePrintHeader(){
  const meta=JSON.parse(localStorage.getItem("pat_meta")||"{}")

  p_client.innerText=meta.clientName||""
  p_address.innerText=meta.clientAddress||""
  p_date.innerText=meta.jobDate||""

  p_engineer.innerText=meta.engineerName||""
  p_company.innerText=meta.company||""
  p_phone.innerText=meta.phone||""
  p_equipment.innerText=meta.equipment||""
  p_serial.innerText=meta.serial||""
  p_calibration.innerText=meta.calibration||""
}

function autoSaveSetup(){
  document.querySelectorAll("input,select").forEach(el=>{
    el.addEventListener("blur",saveMeta)
  })
}

function nextAsset(){
  return rows.length+1
}

function addYearsToISO(iso, years){
  if(!iso) return ""
  const [y,m,d] = iso.split("-").map(Number)
  if(!y || !m || !d) return ""
  const dt = new Date(Date.UTC(y, m-1, d))
  dt.setUTCFullYear(dt.getUTCFullYear() + Number(years || 0))

  const yy = dt.getUTCFullYear()
  const mm = String(dt.getUTCMonth()+1).padStart(2,"0")
  const dd = String(dt.getUTCDate()).padStart(2,"0")
  return `${yy}-${mm}-${dd}`
}

function addRow(){
  const meta = JSON.parse(localStorage.getItem("pat_meta")||"{}")
  const jobISO = meta.jobDate || ""
  const intervalYears = document.getElementById("retestInterval").value
  const retestDue = addYearsToISO(jobISO, intervalYears)

  const row={
    asset:nextAsset(),
    desc:desc.value,
    location:applianceLocation.value,
    visual:visual.value,
    earth:earth.value,
    insulation:insulation.value,
    polarity:polarity.value,
    result:result.value,
    retest:retestDue
  }

  rows.push(row)
  localStorage.setItem("pat_rows",JSON.stringify(rows))
  render()

  desc.value=""
  applianceLocation.value=""
  visual.selectedIndex = 0
  earth.value=""
  insulation.value=""
  document.getElementById("retestInterval").value="1"
}

function render(){
  const body=document.querySelector("#table tbody")
  body.innerHTML=""

  rows.forEach(r=>{
    const tr=document.createElement("tr")
    if(r.result==="Fail") tr.classList.add("fail")

    tr.innerHTML=`
      <td>${r.asset}</td>
      <td>${r.desc}</td>
      <td>${r.location}</td>
      <td>${r.visual || ""}</td>
      <td>${r.earth}</td>
      <td>${r.insulation}</td>
      <td>${r.polarity}</td>
      <td>${r.result}</td>
      <td>${r.retest}</td>
    `
    body.appendChild(tr)
  })
}

function clearData(){
  if(confirm("Clear all test results?")){
    rows=[]
    localStorage.removeItem("pat_rows")
    render()
  }
}

document.getElementById("addBtn").addEventListener("click",addRow)

loadMeta()
autoSaveSetup()
render()
</script>

</body>
</html>
