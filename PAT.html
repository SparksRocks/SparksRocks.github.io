<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAT Logbook</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:Arial;
  margin:10px;
  background:#f3f5f7;
}

h1{
  text-align:center;
}

.section{
  background:white;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:8px;
}

input,select{
  width:100%;
  padding:6px;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:#2c7be5;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#1f5fbf;
}

.tableWrap{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th,td{
  border:1px solid #ccc;
  padding:6px;
}

th{
  background:#e9eef5;
}

.fail{
  background:#ffdede;
  font-weight:bold;
}

.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}

/* PRINT HEADER */
.printHeader{
  display:none;
}

/* ADDED: Screen "print mode" for PDF export (mirrors @media print) */
body.printMode .entrySection{
  display:none;
}
body.printMode .printHeader{
  display:block;
  margin-bottom:15px;
}

/* PRINT MODE (for system print dialog) */
@media print{
  body{
    background:white;
    margin:0;
  }
  .entrySection{
    display:none;
  }
  .printHeader{
    display:block;
    margin-bottom:15px;
  }
  .printHeader table{
    font-size:12px;
    margin-bottom:10px;
  }
  .printHeader td{
    padding:4px;
  }
  button{
    display:none;
  }
  .section {
    box-shadow:none;
  }

  /* CHANGED: Ensure A4 landscape when printing */
  @page {
    size: A4 landscape;
    margin: 12mm;
  }
}
</style>
</head>

<body>

<div class="section entrySection">

  <h3>Engineer Information</h3>

  <div class="grid">

    <label>Engineer Name
      <input id="engineerName">
    </label>

    <label>Company
      <input id="company">
    </label>

    <label>Phone
      <input id="phone">
    </label>

    <label>Equipment Make/Model
      <input id="equipment">
    </label>

    <label>Serial Number
      <input id="serial">
    </label>

    <label>Calibration Date
      <input type="date" id="calibration">
    </label>

  </div>

</div>



<div class="section entrySection">

  <h3>Job Information</h3>

  <div class="grid">

    <label>Client Name
      <input id="clientName">
    </label>

    <label>Client Address
      <input id="clientAddress">
    </label>

    <label>Date
      <input type="date" id="jobDate">
    </label>

  </div>

</div>



<div class="section entrySection">

  <h3>Add Appliance</h3>

  <div class="grid">

    <label>Description
      <input id="desc">
    </label>

    <label>Location
      <!-- RENAMED to avoid window.location collision -->
      <input id="applianceLocation">
    </label>

    <!-- Visual dropdown between Location and Earth Bond Ω -->
    <label>Visual
      <select id="visual" aria-label="Visual inspection">
        <option>✓</option>
        <option>✗</option>
      </select>
    </label>

    <label>Earth Bond (Ω)
      <input id="earth">
    </label>

    <label>Insulation (MΩ)
      <input id="insulation">
    </label>

    <label>Polarity
      <select id="polarity">
        <option>N/A</option>
        <option>✓</option>
        <option>✗</option>
      </select>
    </label>

    <label>Result
      <select id="result">
        <option>Pass</option>
        <option>Fail</option>
      </select>
    </label>

    <!-- CHANGED: Re-Test Date -> Re-Test Interval -->
    <label>Re-Test Interval
      <select id="retestInterval" aria-label="Re-Test Interval">
        <option value="1">1 year</option>
        <option value="2">2 years</option>
      </select>
    </label>
    <!-- END CHANGE -->

  </div>

  <div class="controls">
    <button id="addBtn">Add Appliance</button>
    <!-- CHANGED: Export PDF button -->
    <button id="exportBtn" type="button">Export PDF</button>
    <!-- ADDED: Share button (conditionally displayed) -->
    <button id="shareBtn" type="button" style="display:none">Share PDF</button>
    <button onclick="clearData()">Clear All</button>
    <!-- (You can keep the old print button if you still want OS print dialog)
    <button onclick="window.print()">Print</button>
    -->
  </div>

</div>



<div class="section" id="exportRoot"><!-- ADDED id for export target -->

  <div class="printHeader">

    <h2>PAT Testing Logbook</h2>

    <table>
      <tr><td><b>Client</b></td><td id="p_client"></td></tr>
      <tr><td><b>Address</b></td><td id="p_address"></td></tr>
      <tr><td><b>Date</b></td><td id="p_date"></td></tr>
    </table>

    <table>
      <tr><td><b>Engineer</b></td><td id="p_engineer"></td></tr>
      <tr><td><b>Company</b></td><td id="p_company"></td></tr>
      <tr><td><b>Phone</b></td><td id="p_phone"></td></tr>
      <tr><td><b>Equipment</b></td><td id="p_equipment"></td></tr>
      <tr><td><b>Serial</b></td><td id="p_serial"></td></tr>
      <tr><td><b>Calibration</b></td><td id="p_calibration"></td></tr>
    </table>

  </div>

  <div class="tableWrap">

    <table id="table">

      <thead>
        <tr>
          <th>Asset</th>
          <th>Description</th>
          <th>Location</th>
          <!-- Visual column header -->
          <th>Visual</th>
          <th>Earth Bond (Ω)</th>
          <th>Insulation (MΩ)</th>
          <th>Polarity</th>
          <th>Result</th>
          <th>Re-Test</th>
        </tr>
      </thead>

      <tbody></tbody>

    </table>

  </div>

</div>

<!-- ADDED: html2canvas and jsPDF (from CDN) -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script>
let rows = JSON.parse(localStorage.getItem("pat_rows") || "[]")

function saveMeta(){

  const meta={
    engineerName:engineerName.value,
    company:company.value,
    phone:phone.value,
    equipment:equipment.value,
    serial:serial.value,
    calibration:calibration.value,
    clientName:clientName.value,
    clientAddress:clientAddress.value,
    jobDate:jobDate.value
  }

  localStorage.setItem("pat_meta",JSON.stringify(meta))
  updatePrintHeader()

}

function loadMeta(){

  const meta=JSON.parse(localStorage.getItem("pat_meta")||"{}")

  Object.keys(meta).forEach(k=>{
    const el=document.getElementById(k)
    if(el) el.value=meta[k]
  })

  updatePrintHeader()

}

function updatePrintHeader(){

  const meta=JSON.parse(localStorage.getItem("pat_meta")||"{}")

  p_client.innerText=meta.clientName||""
  p_address.innerText=meta.clientAddress||""
  p_date.innerText=meta.jobDate||""

  p_engineer.innerText=meta.engineerName||""
  p_company.innerText=meta.company||""
  p_phone.innerText=meta.phone||""
  p_equipment.innerText=meta.equipment||""
  p_serial.innerText=meta.serial||""
  p_calibration.innerText=meta.calibration||""

}

function autoSaveSetup(){

  document.querySelectorAll("input,select").forEach(el=>{
    el.addEventListener("blur",saveMeta)
  })

}

function nextAsset(){
  return rows.length+1
}

/** Utility: add N years to a yyyy-mm-dd string; returns yyyy-mm-dd or "" if invalid */
function addYearsToISO(iso, years){
  if(!iso) return ""
  const [y,m,d] = iso.split("-").map(Number)
  if(!y || !m || !d) return ""
  const dt = new Date(Date.UTC(y, m-1, d))
  const targetYear = dt.getUTCFullYear() + Number(years || 0)
  dt.setUTCFullYear(targetYear)
  const yy = dt.getUTCFullYear()
  const mm = String(dt.getUTCMonth()+1).padStart(2,"0")
  const dd = String(dt.getUTCDate()).padStart(2,"0")
  return `${yy}-${mm}-${dd}`
}

function addRow(){

  // Read meta to get the job date (re-test due depends on this)
  const meta = JSON.parse(localStorage.getItem("pat_meta")||"{}")
  const jobISO = meta.jobDate || ""   // expected format yyyy-mm-dd
  const intervalYears = (document.getElementById("retestInterval")?.value) || "1"
  const retestDue = addYearsToISO(jobISO, intervalYears)

  const row={
    asset:nextAsset(),
    desc:desc.value,
    location:applianceLocation.value, // uses renamed input
    visual:visual.value,              // capture visual
    earth:earth.value,
    insulation:insulation.value,
    polarity:polarity.value,
    result:result.value,
    // store the computed date (or "" if job date missing)
    retest:retestDue
  }

  rows.push(row)

  localStorage.setItem("pat_rows",JSON.stringify(rows))

  render()

  // reset inputs
  desc.value=""
  applianceLocation.value=""
  visual.selectedIndex = 0
  earth.value=""
  insulation.value=""
  // reset interval back to 1 year
  const ri = document.getElementById("retestInterval")
  if(ri) ri.value = "1"
}

function render(){

  const body=document.querySelector("#table tbody")
  body.innerHTML=""

  rows.forEach(r=>{

    const tr=document.createElement("tr")

    if(r.result==="Fail") tr.classList.add("fail")

    tr.innerHTML=`
      <td>${r.asset}</td>
      <td>${r.desc}</td>
      <td>${r.location}</td>
      <td>${r.visual || ""}</td>
      <td>${r.earth}</td>
      <td>${r.insulation}</td>
      <td>${r.polarity}</td>
      <td>${r.result}</td>
      <td>${r.retest}</td>
    `

    body.appendChild(tr)

  })

}

function clearData(){

  if(confirm("Clear all test results?")){
    rows=[]
    localStorage.removeItem("pat_rows")
    render()
  }

}

/* ---------- ADDED: PDF EXPORT & SHARE ---------- */

/** Builds a consistent filename based on meta */
function buildFileName(){
  const meta = JSON.parse(localStorage.getItem("pat_meta")||"{}")
  const client = (meta.clientName || "Client").replace(/[^a-z0-9 _-]/gi,"").trim().replace(/\s+/g,'_')
  const date = (meta.jobDate || new Date().toISOString().slice(0,10))
  return `PAT_Logbook_${client}_${date}.pdf`
}

/** Enter/exit screen "print mode" so header shows and forms hide */
function setPrintMode(on){
  document.body.classList.toggle('printMode', !!on)
}

/** Render the export root to a landscape A4 PDF and return a Blob + filename */
async function buildPDFBlob(){
  setPrintMode(true)
  const exportRoot = document.getElementById('exportRoot')
  // Wait a tick so layout updates before capture
  await new Promise(r => setTimeout(r, 50))

  const canvas = await html2canvas(exportRoot, { scale: 2, backgroundColor: '#ffffff', useCORS: true })
  const imgData = canvas.toDataURL('image/png')

  const { jsPDF } = window.jspdf
  const pdf = new jsPDF({ orientation: 'landscape', unit: 'pt', format: 'a4' })
  const pageWidth = pdf.internal.pageSize.getWidth()
  const pageHeight = pdf.internal.pageSize.getHeight()

  // Scale image to page width; compute resulting height
  const imgWidth = pageWidth
  const imgHeight = canvas.height * imgWidth / canvas.width

  // Multi-page if needed by shifting the same image up between pages
  let position = 0
  let remaining = imgHeight

  pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight)
  remaining -= pageHeight

  while (remaining > 0){
    pdf.addPage()
    position -= pageHeight
    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight)
    remaining -= pageHeight
  }

  const blob = pdf.output('blob')
  const filename = buildFileName()

  setPrintMode(false)
  return { blob, filename }
}

/** Trigger a download of the PDF */
async function exportPDF(){
  try{
    const { blob, filename } = await buildPDFBlob()
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url
    a.download = filename
    document.body.appendChild(a)
    a.click()
    a.remove()
    URL.revokeObjectURL(url)
  }catch(err){
    console.error('Export PDF failed:', err)
    alert('Sorry, the PDF export failed. Please try again.')
    setPrintMode(false)
  }
}

/** Share the PDF via Web Share API (if supported) */
async function sharePDF(){
  if(!navigator.share){
    return
  }
  try{
    const { blob, filename } = await buildPDFBlob()
    const file = new File([blob], filename, { type: 'application/pdf', lastModified: Date.now() })

    if (navigator.canShare && navigator.canShare({ files: [file] })){
      await navigator.share({
        files: [file],
        title: 'PAT Testing Logbook',
        text: 'PAT logbook PDF export'
      })
    }else{
      // Fallback: share text only if files aren’t supported
      await navigator.share({
        title: 'PAT Testing Logbook',
        text: 'The PDF was generated — please tap “Export PDF” to download it.'
      })
    }
  }catch(err){
    if (err && err.name === 'AbortError'){
      // User cancelled share; ignore
      return
    }
    console.error('Sharing failed:', err)
    alert('Sharing failed on this device/browser.')
  }finally{
    setPrintMode(false)
  }
}

/** Setup buttons and conditional Share button visibility */
function setupExportShareButtons(){
  const exportBtn = document.getElementById('exportBtn')
  const shareBtn = document.getElementById('shareBtn')

  exportBtn?.addEventListener('click', exportPDF)

  // Show share button only if navigator.share exists
  if (navigator.share){
    shareBtn.style.display = 'inline-block'
    shareBtn.addEventListener('click', sharePDF)
  }
}

/* ---------- END: PDF EXPORT & SHARE ---------- */

document.getElementById("addBtn").addEventListener("click",addRow)

loadMeta()
autoSaveSetup()
render()
setupExportShareButtons()
</script>

</body>
</html>
