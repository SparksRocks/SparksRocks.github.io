<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAT Logbook</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:Arial;
  margin:10px;
  background:#f3f5f7;
}

h1{
  text-align:center;
}

.section{
  background:white;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:8px;
}

input,select{
  width:100%;
  padding:6px;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:#2c7be5;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#1f5fbf;
}

.tableWrap{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th,td{
  border:1px solid #ccc;
  padding:6px;
}

th{
  background:#e9eef5;
}

.fail{
  background:#ffdede;
  font-weight:bold;
}

.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}

/* PRINT HEADER */
.printHeader{
  display:none;
}

/* -------------------
   SCREEN "PRINT MODE"
   ------------------- */
body.printMode{
  background:#ffffff !important;
  margin:0 !important;            /* remove outer whitespace */
}
body.printMode .entrySection{
  display:none !important;
}
body.printMode .printHeader{
  display:block !important;
  margin-bottom:15px !important;
}

/* remove visual artifacts that can create halos/borders */
body.printMode .section{
  box-shadow:none !important;
  border:none !important;
  border-radius:0 !important;
  margin:0 !important;            /* collapse vertical gaps */
  padding:0 !important;           /* optional: tighter top */
}
body.printMode #exportRoot{
  padding:12px 12px 0 12px !important; /* internal white margin if you want breathing room */
  background:#ffffff !important;
}

/* Ensure full-width capture on mobile (no horizontal clipping) */
body.printMode .tableWrap{
  overflow: visible !important;
}

/* Let the table expand to its natural width during capture */
body.printMode table{
  width: max-content !important;   /* fit columns */
  max-width: none !important;      /* remove container limits */
}

/* -------------------
   SYSTEM PRINT MODE
   ------------------- */
@media print{
  body{
    background:white;
    margin:0;
  }
  .entrySection{
    display:none;
  }
  .printHeader{
    display:block;
    margin-bottom:15px;
  }
  .printHeader table{
    font-size:12px;
    margin-bottom:10px;
  }
  .printHeader td{
    padding:4px;
  }
  button{
    display:none;
  }
  .section {
    box-shadow:none;
  }

  /* Ensure A4 landscape when printing */
  @page {
    size: A4 landscape;
    margin: 12mm;
  }
}
</style>
</head>

<body>

<div class="section entrySection">

  <h3>Engineer Information</h3>

  <div class="grid">

    <label>Engineer Name
      <input id="engineerName">
    </label>

    <label>Company
      <input id="company">
    </label>

    <label>Phone
      <input id="phone">
    </label>

    <label>Equipment Make/Model
      <input id="equipment">
    </label>

    <label>Serial Number
      <input id="serial">
    </label>

    <label>Calibration Date
      <input type="date" id="calibration">
    </label>

  </div>

</div>



<div class="section entrySection">

  <h3>Job Information</h3>

  <div class="grid">

    <label>Client Name
      <input id="clientName">
    </label>

    <label>Client Address
      <input id="clientAddress">
    </label>

    <label>Date
      <input type="date" id="jobDate">
    </label>

  </div>

</div>



<div class="section entrySection">

  <h3>Add Appliance</h3>

  <div class="grid">

    <label>Description
      <input id="desc">
    </label>

    <label>Location
      <!-- RENAMED to avoid window.location collision -->
      <input id="applianceLocation">
    </label>

    <!-- Visual dropdown between Location and Earth Bond Ω -->
    <label>Visual
      <select id="visual" aria-label="Visual inspection">
        <option>✓</option>
        <option>✗</option>
      </select>
    </label>

    <label>Earth Bond (Ω)
      <input id="earth">
    </label>

    <label>Insulation (MΩ)
      <input id="insulation">
    </label>

    <label>Polarity
      <select id="polarity">
        <option>N/A</option>
        <option>✓</option>
        <option>✗</option>
      </select>
    </label>

    <label>Result
      <select id="result">
        <option>Pass</option>
        <option>Fail</option>
      </select>
    </label>

    <!-- Re-Test Interval -->
    <label>Re-Test Interval
      <select id="retestInterval" aria-label="Re-Test Interval">
        <option value="1">1 year</option>
        <option value="2">2 years</option>
      </select>
    </label>
    <!-- END -->

  </div>

  <div class="controls">
    <button id="addBtn">Add Appliance</button>
    <button id="exportBtn" type="button">Export PDF</button>
    <button id="shareBtn" type="button" style="display:none">Share PDF</button>
    <button onclick="clearData()">Clear All</button>
    <!-- (Optional print dialog)
    <button onclick="window.print()">Print</button>
    -->
  </div>

</div>



<div class="section" id="exportRoot"><!-- export target -->

  <div class="printHeader">

    <h2>PAT Testing Logbook</h2>

    <table>
      <tr><td><b>Client</b></td><td id="p_client"></td></tr>
      <tr><td><b>Address</b></td><td id="p_address"></td></tr>
      <tr><td><b>Date</b></td><td id="p_date"></td></tr>
    </table>

    <table>
      <tr><td><b>Engineer</b></td><td id="p_engineer"></td></tr>
      <tr><td><b>Company</b></td><td id="p_company"></td></tr>
      <tr><td><b>Phone</b></td><td id="p_phone"></td></tr>
      <tr><td><b>Equipment</b></td><td id="p_equipment"></td></tr>
      <tr><td><b>Serial</b></td><td id="p_serial"></td></tr>
      <tr><td><b>Calibration</b></td><td id="p_calibration"></td></tr>
    </table>

  </div>

  <div class="tableWrap">

    <table id="table">

      <thead>
        <tr>
          <th>Asset</th>
          <th>Description</th>
          <th>Location</th>
          <th>Visual</th>
          <th>Earth Bond (Ω)</th>
          <th>Insulation (MΩ)</th>
          <th>Polarity</th>
          <th>Result</th>
          <th>Re-Test</th>
        </tr>
      </thead>

      <tbody></tbody>

    </table>

  </div>

</div>

<!-- html2canvas and jsPDF (from CDN) -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script>
let rows = JSON.parse(localStorage.getItem("pat_rows") || "[]")

function saveMeta(){

  const meta={
    engineerName:engineerName.value,
    company:company.value,
    phone:phone.value,
    equipment:equipment.value,
    serial:serial.value,
    calibration:calibration.value,
    clientName:clientName.value,
    clientAddress:clientAddress.value,
    jobDate:jobDate.value
  }

  localStorage.setItem("pat_meta",JSON.stringify(meta))
  updatePrintHeader()

}

function loadMeta(){

  const meta=JSON.parse(localStorage.getItem("pat_meta")||"{}")

  Object.keys(meta).forEach(k=>{
    const el=document.getElementById(k)
    if(el) el.value=meta[k]
  })

  updatePrintHeader()

}

function updatePrintHeader(){

  const meta=JSON.parse(localStorage.getItem("pat_meta")||"{}")

  p_client.innerText=meta.clientName||""
  p_address.innerText=meta.clientAddress||""
  p_date.innerText=meta.jobDate||""

  p_engineer.innerText=meta.engineerName||""
  p_company.innerText=meta.company||""
  p_phone.innerText=meta.phone||""
  p_equipment.innerText=meta.equipment||""
  p_serial.innerText=meta.serial||""
  p_calibration.innerText=meta.calibration||""

}

function autoSaveSetup(){

  document.querySelectorAll("input,select").forEach(el=>{
    el.addEventListener("blur",saveMeta)
  })

}

function nextAsset(){
  return rows.length+1
}

/** Utility: add N years to a yyyy-mm-dd string; returns yyyy-mm-dd or "" if invalid */
function addYearsToISO(iso, years){
  if(!iso) return ""
  const [y,m,d] = iso.split("-").map(Number)
  if(!y || !m || !d) return ""
  const dt = new Date(Date.UTC(y, m-1, d))
  const targetYear = dt.getUTCFullYear() + Number(years || 0)
  dt.setUTCFullYear(targetYear)
  const yy = dt.getUTCFullYear()
  const mm = String(dt.getUTCMonth()+1).padStart(2,"0")
  const dd = String(dt.getUTCDate()).padStart(2,"0")
  return `${yy}-${mm}-${dd}`
}

function addRow(){

  // Read meta to get the job date (re-test due depends on this)
  const meta = JSON.parse(localStorage.getItem("pat_meta")||"{}")
  const jobISO = meta.jobDate || ""   // expected format yyyy-mm-dd
  const intervalYears = (document.getElementById("retestInterval")?.value) || "1"
  const retestDue = addYearsToISO(jobISO, intervalYears)

  const row={
    asset:nextAsset(),
    desc:desc.value,
    location:applianceLocation.value, // uses renamed input
    visual:visual.value,              // capture visual
    earth:earth.value,
    insulation:insulation.value,
    polarity:polarity.value,
    result:result.value,
    // store the computed date (or "" if job date missing)
    retest:retestDue
  }

  rows.push(row)

  localStorage.setItem("pat_rows",JSON.stringify(rows))

  render()

  // reset inputs
  desc.value=""
  applianceLocation.value=""
  visual.selectedIndex = 0
  earth.value=""
  insulation.value=""
  // reset interval back to 1 year
  const ri = document.getElementById("retestInterval")
  if(ri) ri.value = "1"
}

function render(){

  const body=document.querySelector("#table tbody")
  body.innerHTML=""

  rows.forEach(r=>{

    const tr=document.createElement("tr")

    if(r.result==="Fail") tr.classList.add("fail")

    tr.innerHTML=`
      <td>${r.asset}</td>
      <td>${r.desc}</td>
      <td>${r.location}</td>
      <td>${r.visual || ""}</td>
      <td>${r.earth}</td>
      <td>${r.insulation}</td>
      <td>${r.polarity}</td>
      <td>${r.result}</td>
      <td>${r.retest}</td>
    `

    body.appendChild(tr)

  })

}

function clearData(){

  if(confirm("Clear all test results?")){
    rows=[]
    localStorage.removeItem("pat_rows")
    render()
  }

}

/* ---------- PDF EXPORT & SHARE ---------- */

/** Builds a consistent filename based on meta */
function buildFileName(){
  const meta = JSON.parse(localStorage.getItem("pat_meta")||"{}")
  const client = (meta.clientName || "Client").replace(/[^a-z0-9 _-]/gi,"").trim().replace(/\s+/g,'_')
  const date = (meta.jobDate || new Date().toISOString().slice(0,10))
  return `PAT_Logbook_${client}_${date}.pdf`
}

/** Enter/exit screen "print mode" so header shows and forms hide */
function setPrintMode(on){
  document.body.classList.toggle('printMode', !!on)
}

/** Ensure layout + fonts are ready before capture (Android-friendly) */
async function waitForLayout() {
  try { await window.document.fonts?.ready; } catch(e) {}
  await new Promise(r => requestAnimationFrame(r));
  await new Promise(r => requestAnimationFrame(r));
}

/** Render the export root to a landscape A4 PDF and return a Blob + filename */
async function buildPDFBlob(){
  setPrintMode(true);
  const exportRoot = document.getElementById('exportRoot');

  // Wait for layout to stabilize with header shown
  await waitForLayout();

  // Measure full content size
  const fullWidth = Math.max(exportRoot.scrollWidth, exportRoot.offsetWidth);
  const fullHeight = Math.max(exportRoot.scrollHeight, exportRoot.offsetHeight);

  // Temporarily expand the root so html2canvas can see full width
  const prevWidth = exportRoot.style.width;
  exportRoot.style.width = fullWidth + 'px';

  // Cap the render scale so we don't hit mobile bitmap limits
  const MAX_CANVAS_WIDTH = 4096; // safe for Android Chrome
  const deviceScale = Math.min(window.devicePixelRatio || 1, 2);
  const scale = Math.min(2, (MAX_CANVAS_WIDTH / fullWidth), deviceScale);

  try{
    const canvas = await html2canvas(exportRoot, {
      scale,
      width: fullWidth,
      height: fullHeight,
      windowWidth: fullWidth,
      windowHeight: fullHeight,
      backgroundColor: '#ffffff',
      useCORS: true,
      logging: false
    });

    // Use JPEG for smaller memory footprint on mobile
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'pt', format: 'a4', compress: true });
    const pageWidth = pdf.internal.pageSize.getWidth();   // ~842pt
    const pageHeight = pdf.internal.pageSize.getHeight(); // ~595pt

    // Fill white background (avoids any transparent edges showing as grey)
    pdf.setFillColor(255,255,255);

    // Map canvas width -> page width; derive how many canvas pixels fit per page vertically
    const pxPerPt = canvas.width / pageWidth;
    const pageHeightPx = Math.floor(pageHeight * pxPerPt);

    // Slice the canvas into page-sized chunks (more reliable on Android than negative offsets)
    for (let y = 0, page = 0; y < canvas.height; y += pageHeightPx, page++) {
      const sliceHeight = Math.min(pageHeightPx, canvas.height - y);

      // Create a slice
      const pageCanvas = document.createElement('canvas');
      pageCanvas.width = canvas.width;
      pageCanvas.height = sliceHeight;
      const pageCtx = pageCanvas.getContext('2d');

      // Disable smoothing to avoid edge fuzz
      pageCtx.imageSmoothingEnabled = true;
      pageCtx.imageSmoothingQuality = 'high';

      // Draw the portion of the full canvas into the slice
      pageCtx.drawImage(canvas, 0, -y);

      // Add to PDF (height in pt is sliceHeight/pxPerPt)
      const sliceHeightPt = sliceHeight / pxPerPt;
      const imgData = pageCanvas.toDataURL('image/jpeg', 0.92);

      if (page > 0) pdf.addPage();

      // Paint white background then overfill the image slightly to avoid a thin border
      pdf.rect(0, 0, pageWidth, pageHeight, 'F');

      // Overfill by 0.5pt with -0.25pt offset so no 1px halo appears
      const bleed = 0.5;   // pts
      const offset = -bleed/2;
      pdf.addImage(
        imgData,
        'JPEG',
        offset,                // x
        offset,                // y
        pageWidth + bleed,     // width
        sliceHeightPt + bleed, // height
        undefined,
        'FAST'
      );
    }

    const blob = pdf.output('blob');
    const filename = buildFileName();

    return { blob, filename };
  } finally {
    // Always restore styles + mode
    exportRoot.style.width = prevWidth;
    setPrintMode(false);
  }
}

/** Trigger a download of the PDF */
async function exportPDF(){
  try{
    const { blob, filename } = await buildPDFBlob()
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url
    a.download = filename
    document.body.appendChild(a)
    a.click()
    a.remove()
    URL.revokeObjectURL(url)
  }catch(err){
    console.error('Export PDF failed:', err)
    alert('Sorry, the PDF export failed. Please try again.')
    setPrintMode(false)
  }
}

/** Share the PDF via Web Share API (if supported) */
async function sharePDF(){
  if(!navigator.share){
    return
  }
  try{
    const { blob, filename } = await buildPDFBlob()
    const file = new File([blob], filename, { type: 'application/pdf', lastModified: Date.now() })

    if (navigator.canShare && navigator.canShare({ files: [file] })){
      await navigator.share({
        files: [file],
        title: 'PAT Testing Logbook',
        text: 'PAT logbook PDF export'
      })
    }else{
      // Fallback: share text only if files aren’t supported
      await navigator.share({
        title: 'PAT Testing Logbook',
        text: 'The PDF was generated — please tap “Export PDF” to download it.'
      })
    }
  }catch(err){
    if (err && err.name === 'AbortError'){
      // User cancelled share; ignore
      return
    }
    console.error('Sharing failed:', err)
    alert('Sharing failed on this device/browser.')
  }finally{
    setPrintMode(false)
  }
}

/** Setup buttons and conditional Share button visibility */
function setupExportShareButtons(){
  const exportBtn = document.getElementById('exportBtn')
  const shareBtn = document.getElementById('shareBtn')

  exportBtn?.addEventListener('click', exportPDF)

  // Show share button only if navigator.share exists
  if (navigator.share){
    shareBtn.style.display = 'inline-block'
    shareBtn.addEventListener('click', sharePDF)
  }
}

/* ---------- END: PDF EXPORT & SHARE ---------- */

document.getElementById("addBtn").addEventListener("click",addRow)

loadMeta()
autoSaveSetup()
render()
setupExportShareButtons()
</script>

</body>
</html>
