<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAT Logbook</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:Arial;
  margin:10px;
  background:#f3f5f7;
}

.section{
  background:white;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:8px;
}

input,select{
  width:100%;
  padding:6px;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:#2c7be5;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#1f5fbf;
}

.tableWrap{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th,td{
  border:1px solid #ccc;
  padding:6px;
}

.fail{
  background:#ffdede;
  font-weight:bold;
}

.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="section entrySection">
<h3>Engineer Information</h3>
<div class="grid">
<label>Engineer Name <input id="engineerName"></label>
<label>Company <input id="company"></label>
<label>Phone <input id="phone"></label>
<label>Equipment <input id="equipment"></label>
<label>Serial <input id="serial"></label>
<label>Calibration <input type="date" id="calibration"></label>
</div>
</div>

<div class="section entrySection">
<h3>Job Information</h3>
<div class="grid">
<label>Client Name <input id="clientName"></label>
<label>Client Address <input id="clientAddress"></label>
<label>Date <input type="date" id="jobDate"></label>
</div>
</div>

<div class="section entrySection">
<h3>Add Appliance</h3>

<div class="grid">
<label>Description <input id="desc"></label>
<label>Location <input id="applianceLocation"></label>

<label>Visual
<select id="visual">
<option>✓</option><option>✗</option>
</select>
</label>

<label>Earth Bond (Ω)
<input id="earth" type="number" step="0.01" inputmode="decimal">
</label>

<label>Insulation (MΩ)
<input id="insulation" type="number" step="0.01" inputmode="decimal">
</label>

<label>Polarity
<select id="polarity">
<option>N/A</option><option>✓</option><option>✗</option>
</select>
</label>

<label>Result
<select id="result">
<option>Pass</option><option>Fail</option>
</select>
</label>

<label>Re-Test Interval
<select id="retestInterval">
<option value="1">1 year</option>
<option value="2">2 years</option>
</select>
</label>
</div>

<div class="controls">
<button id="addBtn">Add Appliance</button>
<button onclick="sharePDF()">Share PDF</button>
<button onclick="clearData()">Clear All</button>
</div>
</div>

<div class="section">
<div class="tableWrap">
<table id="table">
<thead>
<tr>
<th>Asset</th><th>Description</th><th>Location</th>
<th>Visual</th><th>Earth</th><th>Insulation</th>
<th>Polarity</th><th>Result</th><th>Re-Test</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<script>
let rows = JSON.parse(localStorage.getItem("pat_rows") || "[]")

function nextAsset(){ return rows.length+1 }

function addYearsToISO(iso, years){
  if(!iso) return ""
  const [y,m,d] = iso.split("-").map(Number)
  const dt = new Date(y,m-1,d)
  dt.setFullYear(dt.getFullYear()+Number(years))
  return dt.toISOString().split("T")[0]
}

function addRow(){
  const jobDate = jobDateInput.value
  const interval = document.getElementById("retestInterval").value

  const row={
    asset:nextAsset(),
    desc:desc.value,
    location:applianceLocation.value,
    visual:visual.value,
    earth:earth.value,
    insulation:insulation.value,
    polarity:polarity.value,
    result:result.value,
    retest:addYearsToISO(jobDate,interval)
  }

  rows.push(row)
  localStorage.setItem("pat_rows",JSON.stringify(rows))
  render()

  desc.value=""
  applianceLocation.value=""
  earth.value=""
  insulation.value=""
}

function render(){
  const body=document.querySelector("#table tbody")
  body.innerHTML=""

  rows.forEach(r=>{
    const tr=document.createElement("tr")
    if(r.result==="Fail") tr.classList.add("fail")

    tr.innerHTML=`
      <td>${r.asset}</td>
      <td>${r.desc}</td>
      <td>${r.location}</td>
      <td>${r.visual}</td>
      <td>${r.earth}</td>
      <td>${r.insulation}</td>
      <td>${r.polarity}</td>
      <td>${r.result}</td>
      <td>${r.retest}</td>
    `
    body.appendChild(tr)
  })
}

function clearData(){
  if(confirm("Clear all?")){
    rows=[]
    localStorage.removeItem("pat_rows")
    render()
  }
}

/* ✅ PDF + SHARE */
async function sharePDF(){

  const { jsPDF } = window.jspdf
  const doc = new jsPDF({orientation:"landscape"})

  const pageHeight = doc.internal.pageSize.height

  let y=10

  // Title
  doc.setFontSize(16)
  doc.text("PAT Testing Logbook", 10, y)

  y+=10
  doc.setFontSize(10)

  // =========================
  // HEADER (2 COLUMN)
  // =========================

  let leftY = y

  doc.text(`Engineer: ${engineerName.value}`,10,leftY)
  doc.text(`Phone: ${phone.value}`,10,leftY+6)
  doc.text(`Company: ${company.value}`,10,leftY+12)
  doc.text(`Equipment: ${equipment.value}`,10,leftY+18)
  doc.text(`Serial: ${serial.value}`,10,leftY+24)
  doc.text(`Calibration: ${calibration.value}`,10,leftY+30)

  let rightX = 150
  doc.text(`Client: ${clientName.value}`,rightX,leftY)
  doc.text(`Date: ${jobDate.value}`,rightX,leftY+6)
  doc.text(`Address: ${clientAddress.value}`,rightX,leftY+12)

  y = leftY + 40

  // =========================
  // TABLE CONFIG
  // =========================

  const headers = ["Asset","Description","Location","Visual","Earth","Insulation","Polarity","Result","Re-Test"]
  const colWidths = [15,50,40,20,25,25,25,25,30]
  const rowHeight = 7
  const startX = 10

function drawHeader() {
  let x = startX;

  // Save current graphics state pieces we're about to change
  const prevText = doc.getTextColor();   // jsPDF returns an object in recent builds
  const prevDraw = doc.getDrawColor();
  const prevFill = doc.getFillColor();
  const prevFontSize = doc.getFontSize();
  const prevFont = doc.getFont();

  // Header palette
  const headerFill = [34, 34, 34];   // dark
  const headerText = [255, 255, 255];
  const stroke = [0, 0, 0];

  // Header style
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(10);

  headers.forEach((h, i) => {
    doc.setFillColor(...headerFill);
    doc.setDrawColor(...stroke);
    doc.setTextColor(...headerText);

    doc.rect(x, y, colWidths[i], rowHeight, 'F'); // fill
    doc.rect(x, y, colWidths[i], rowHeight, 'S'); // stroke
    doc.text(String(h), x + 2, y + 5);

    x += colWidths[i];
  });

  y += rowHeight;

  // Restore state so body rows aren't white
  doc.setFont(prevFont.fontName || 'helvetica', prevFont.fontStyle || 'normal');
  doc.setFontSize(prevFontSize);

  // For colors, handle both array and object forms defensively:
  const toRGB = c => Array.isArray(c) ? c : [c.r ?? 0, c.g ?? 0, c.b ?? 0];

  doc.setTextColor(...toRGB(prevText));
  doc.setDrawColor(...toRGB(prevDraw));
  doc.setFillColor(...toRGB(prevFill));
}


  drawHeader()

  // =========================
  // ROWS
  // =========================

  rows.forEach((r,index)=>{

    // 🔥 PAGE BREAK CHECK
    if(y + rowHeight > pageHeight - 10){
      doc.addPage()
      y = 10
      drawHeader()
    }

    let x = startX

    // Zebra stripe
    if(index % 2 === 0){
      doc.setFillColor(240,240,240)
      doc.rect(startX,y,colWidths.reduce((a,b)=>a+b,0),rowHeight,"F")
    }

    // Fix tick/cross
    const fix = (val)=>{
      if(val === "✓") return "Pass"
      if(val === "✗") return "Fail"
      return val || ""
    }

    const vals = [
      r.asset,
      r.desc,
      r.location,
      fix(r.visual),
      r.earth,
      r.insulation,
      fix(r.polarity),
      r.result,
      r.retest
    ]

    vals.forEach((v,i)=>{
      doc.rect(x,y,colWidths[i],rowHeight)
      doc.text(String(v),x+1,y+5)
      x += colWidths[i]
    })

    y += rowHeight
  })

  // =========================
  // SHARE
  // =========================

  const blob = doc.output("blob")
  const file = new File([blob], "PAT_Logbook.pdf", { type: "application/pdf" })

  if(navigator.canShare && navigator.canShare({ files: [file] })){
    await navigator.share({
      title: "PAT Logbook",
      files: [file]
    })
  } else {
    doc.save("PAT_Logbook.pdf")
  }
}

document.getElementById("addBtn").addEventListener("click",addRow)

const jobDateInput = document.getElementById("jobDate")

render()
</script>

</body>
</html>
